<footer class="site-footer">
  <div class="container site-footer__inner">
    <div class="site-footer__brand">
      <span class="site-footer__name">{{ site.title }}</span>
      <span class="site-footer__tag">{{ site.tagline }}</span>
    </div>

    <nav class="site-footer__social" aria-label="Social links">
      {%- for social in site.data.profile.socials -%}
        <a href="{{ social.url }}" class="social-link" aria-label="{{ social.name }}"
           target="_blank" rel="noopener noreferrer">
          {% include icon.html name=social.icon %}
        </a>
      {%- endfor -%}
    </nav>

    <p class="site-footer__copy">
      &copy; {{ site.time | date: "%Y" }} {{ site.title }}. All rights reserved.
    </p>
  </div>
</footer>
