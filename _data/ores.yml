# ---------------------------------------------------------------------------
# Ore blocks for the Minecraft theme's "mine for intel" minigame.
# Each block is rendered as a mineable ore. Whack it `hardness` times with the
# pickaxe cursor to break it and reveal the hidden info.
#
#   type     -> coal | iron | redstone | gold | emerald | diamond
#               (controls the ore colour / speck pattern)
#   hardness -> number of hits required to break the block
#   icon     -> emoji shown on the dropped "item" card
#   title    -> heading revealed when mined
#   body     -> HTML revealed when mined
# ---------------------------------------------------------------------------

