# ---------------------------------------------------------------------------
# Passions & Interests cards. Render order below = display order:
#   1) Basketball Mens League — kind: link  -> /basketball/ (live data page)
#   2) Sports                 — kind: panel (multi-sport history; see _includes/passions/sports.html)
#   3) Music                  — kind: panel (music production)
#   4) Gaming                 — kind: panel (League of Legends)
#
#   - "kind: panel" cards open an in-page zoom panel. Panels with a bespoke
#     layout (sports/music/gaming) render via _includes/passions/<id>.html;
#     any other panel falls back to _includes/passions/generic.html.
#   - "kind: link" cards navigate to a full page.
#   - "featured: true" renders a large hero banner at the top of the grid;
#     Basketball is featured because it's the live, data-driven experience.
# Each card carries its own accent (RGB triplet) used for icon tint + glow,
# so the grid reads as distinct, themed tiles in both light and dark.
# Body copy for the placeholder panels is marked TODO(Kevin) — swap freely.
# ---------------------------------------------------------------------------

- id: basketball
  kind: link
  featured: true
  title: Basketball Mens League
  icon: basketball
  tagline: On the court with Bagwork 2.0 — live game stats and the latest highlight reel, pulled straight from the league.
  badge: Live stats
  cta: Step onto the court
  accent: "249, 115, 22"      # basketball orange
  href: /basketball/

# Multi-sport history. Opens the zoom panel; each list item below renders as
# one stat-line section via _includes/passions/sports.html. Add / remove /
# rename sports by editing the `sports:` list — order here = display order.
- id: sports
  kind: panel
  title: Sports
  icon: trophy
  tagline: A lifetime of teams, positions, and box scores.
  accent: "56, 189, 248"      # sky blue — distinct from basketball orange
  intro: >-
    TODO(Kevin): A line or two about growing up playing sports — what they
    taught you, the teams that meant the most, and how competing shaped you.
  sports:
    # Each section: name + years/level + position/role + a standout memory.
    # Optional: add `image: /assets/images/<file>` to show a photo.
    - name: "Soccer"                 # TODO(Kevin): your real sport
      years: "TODO(Kevin): 2016–2020"
      level: "TODO(Kevin): High school varsity"
      position: "TODO(Kevin): Centre-back"
      memory: "TODO(Kevin): A standout memory, achievement, or stat — a line or two."
    - name: "Volleyball"             # TODO(Kevin)
      years: "TODO(Kevin): years played"
      level: "TODO(Kevin): club / school / intramural"
      position: "TODO(Kevin): position / role"
      memory: "TODO(Kevin): a standout memory or result."
    - name: "Badminton"             # TODO(Kevin)
      years: "TODO(Kevin): years played"
      level: "TODO(Kevin): level"
      position: "TODO(Kevin): singles / doubles"
      memory: "TODO(Kevin): a standout memory or result."
    - name: "Track & Field"          # TODO(Kevin)
      years: "TODO(Kevin): years played"
      level: "TODO(Kevin): level"
      position: "TODO(Kevin): event(s)"
      memory: "TODO(Kevin): a PR, medal, or memory."

