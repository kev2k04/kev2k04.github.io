  # The three styles I produce. Each section gets an inline MP3 player.
  # To add a track: drop the .mp3 into `assets/audio/` and set its `file:`
  # to e.g. /assets/audio/my-track.mp3 — leave `file:` blank for an upload
  # placeholder. You can list more than one track per section.
  sections:
    - name: "Pop"
      blurb: "TODO(Kevin): a line about your pop sound / influences."
      tracks:
