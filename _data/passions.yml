# ---------------------------------------------------------------------------
# Passions & Interests cards. Render order below = display order:
#   1) Basketball Mens League — kind: link  -> /basketball/ (live data page)
#   2) Music                  — kind: panel (music production)
#   3) Gaming                 — kind: panel (League of Legends)
#   4) Sports                 — kind: panel (multi-sport history; see _includes/passions/sports.html)
#
#   - "kind: panel" cards open an in-page zoom panel. Panels with a bespoke
#     layout (sports/music/gaming) render via _includes/passions/<id>.html;
#     any other panel falls back to _includes/passions/generic.html.
#   - "kind: link" cards navigate to a full page.
#   - "featured: true" renders a large hero banner at the top of the grid;
#     Basketball is featured because it's the live, data-driven experience.
# Each card carries its own accent (RGB triplet) used for icon tint + glow,
# so the grid reads as distinct, themed tiles in both light and dark.
# Body copy for the placeholder panels is marked TODO(Kevin) — swap freely.
# ---------------------------------------------------------------------------

- id: basketball
  kind: link
  featured: true
  title: Basketball Mens League
  icon: basketball
  tagline: On the court with Bagwork 2.0 — live game stats and the latest highlight reel, pulled straight from the league.
  badge: Live stats
  cta: Step onto the court
  accent: "249, 115, 22"      # basketball orange
  href: /basketball/

# Music production panel — rendered by _includes/passions/music.html.
- id: music
  kind: panel
  title: Music
  icon: music
  tagline: Producing tracks, one session at a time.
  accent: "168, 85, 247"      # violet
  intro: >-
    I've always had a love for music, as I felt like it was a form of
    communication of feelings that could transcend language. However, I had to
    pay my dues of being an Asian kid, as with strict Asian parents growing up,
    I was forced to play the piano. After finishing RCM 10, I met one of my best
    friends to date, Alex, who introduced me to the DAW I use, Fruity Loops
    (FL Studio). My music taste has changed over time, from hip-hop, to
    digital-pop, to Electronic Dance Music, and so has my production style.
  daw: "TODO(Kevin): DAW — e.g. FL Studio / Ableton Live"
  gear: "TODO(Kevin): key gear — MIDI keyboard, interface, monitors"
  # Styles I produce. Each track has a title, a credit line (inspired-by, or
  # collab/sample), and an MP3. To play a track: drop the .mp3 into
  # `assets/audio/` and set its `file:` (e.g. /assets/audio/neverless.mp3);
  # leave `file:` blank for a waveform upload placeholder.
  sections:
    # Featured (full-width hero) — original songs I've written.
    - name: "Self-Produced Songs"
      featured: true
      tracks:
        - title: "Stay"
          collab: "Lyrics by Alex"
