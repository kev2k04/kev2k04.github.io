    # Optional: add `image: /assets/images/<file>` to show a photo.
    - name: "Soccer"                 # TODO(Kevin): your real sport
      years: "TODO(Kevin): 2016–2020"
      level: "TODO(Kevin): High school varsity"
      position: "TODO(Kevin): Centre-back"
      memory: "TODO(Kevin): A standout memory, achievement, or stat — a line or two."
    - name: "Volleyball"             # TODO(Kevin)
      years: "TODO(Kevin): years played"
      level: "TODO(Kevin): club / school / intramural"
      position: "TODO(Kevin): position / role"
      memory: "TODO(Kevin): a standout memory or result."
    - name: "Badminton"             # TODO(Kevin)
      years: "TODO(Kevin): years played"
      level: "TODO(Kevin): level"
      position: "TODO(Kevin): singles / doubles"
      memory: "TODO(Kevin): a standout memory or result."
    - name: "Track & Field"          # TODO(Kevin)
      years: "TODO(Kevin): years played"
      level: "TODO(Kevin): level"
      position: "TODO(Kevin): event(s)"
      memory: "TODO(Kevin): a PR, medal, or memory."

# Music production panel — rendered by _includes/passions/music.html.
- id: music
  kind: panel
  title: Music
  icon: music
  tagline: Producing tracks, one session at a time.
  accent: "168, 85, 247"      # violet
  intro: >-
    I've always had a love for music, as I felt like it was a form of
    communication of feelings that could transcend language. However, I had to
    pay my dues of being an Asian kid, as with strict Asian parents growing up,
    I was forced to play the piano. After finishing RCM 10, I met one of my best
    friends to date, Alex, who introduced me to the DAW I use, Fruity Loops
    (FL Studio). My music taste has changed over time, from hip-hop, to
    digital-pop, to Electronic Dance Music, and so has my production style.
  daw: "TODO(Kevin): DAW — e.g. FL Studio / Ableton Live"
  gear: "TODO(Kevin): key gear — MIDI keyboard, interface, monitors"
  # Styles I produce. Each track has a title, a credit line (inspired-by, or
  # collab/sample), and an MP3. To play a track: drop the .mp3 into
  # `assets/audio/` and set its `file:` (e.g. /assets/audio/neverless.mp3);
  # leave `file:` blank for a waveform upload placeholder.
  sections:
    - name: "Hip-Hop"
      blurb: "TODO(Kevin): a line about your hip-hop sound / influences."
      tracks:
        - title: "Stay"
          collab: "Lyrics by Alex"
          sample: "Samples Imogen Heap"
          file: ""        # e.g. /assets/audio/stay.mp3
    - name: "Electronic Dance Music"
      blurb: "TODO(Kevin): a line about your EDM — subgenres, energy, sets."
      tracks:
        - title: "Neverless"
          inspired: "Inspired by Tonser, 2hollis, and Nate Sib"
          file: ""        # e.g. /assets/audio/neverless.mp3
        - title: "Flashing Lights"
          inspired: "Inspired by Tonser, 2hollis, and Nate Sib"
          file: ""        # e.g. /assets/audio/flashing-lights.mp3
    - name: "Experimental Hip-Hop"
      blurb: "TODO(Kevin): a line about your experimental hip-hop direction."
      tracks:
        - title: "Exotic"
          inspired: "Inspired by Ginseng, 2hollis, and Lucy Bedroque"
          file: ""        # e.g. /assets/audio/exotic.mp3
        - title: "Pink Noise"
          inspired: "Inspired by Ginseng, 2hollis, and Lucy Bedroque"
          file: ""        # e.g. /assets/audio/pink-noise.mp3
  # Favourite albums — square artwork placeholders. Add `art:` later if you
  # want to wire real images (currently a TODO upload placeholder each).
