# ---------------------------------------------------------------------------
# Experience panels — drives the /experience/ page.
# Each entry is fully independent: edit one without touching the others.
#
# PLACEHOLDERS to swap out later:
#   - logo: drop a real logo file in /assets/images/logos/ and set `logo:`
#     to its path. While empty, the monogram in `logo_text` is shown instead.
#   - blurb: replace the "Placeholder —" sentence with a real summary.
#   - skills: tweak the tag list to taste.
#   - image: each panel shows a sized photo placeholder; add a real photo via
#     the `image:` field (path under /assets/images/) when you have one.
# ---------------------------------------------------------------------------

- id: seaspan
  company: Seaspan
  logo_text: SE
  logo: "/assets/images/logos/seaspan.png"            # e.g. /assets/images/logos/seaspan.svg
  role: "FP&A Analyst"
  dates: "May 2026 – Present"
  location: "Vancouver, Canada"
  blurb: >-
    I'm currently working at Seaspan as a Financial Analyst Intern within the
    FP&amp;A department. Here, I support forecasting, budgeting, and executive
    reporting initiatives as a primary responsibility along with any Ad Hoc
    projects I can get my hands on!
  image: "/assets/images/seaspan.jpg"
  # Points can be a plain string OR an object. A `key: true` point becomes a
  # clickable, shining highlight; add `image:` to show a popup on hover.
  points:
    - key: true
      image: "/assets/images/CFO Townhall.jpg"
      text: >-
        During my first month at Seaspan, I had the opportunity to work on a
        long-term forecast model spanning 2027 to 2040. I ran scenario and
        sensitivity analyses that considered factors such as inflation,
        project-win assumptions, and best/worst-case outcomes. The work supported
        financial reporting for a CFO Town Hall, where the results were presented
        by Seaspan's CFO, James Clarke.
    - text: >-
        This project gave me early exposure to how long-range financial planning
        supports executive decision-making, and helped me better understand the
        role FP&amp;A plays in translating complex assumptions into clear business
        insights.
  skills:
    - Excel
    - SAP
    - Power BI
    - Variance Analysis
    - Forecasting

